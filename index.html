<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amna &amp; Adil — Nikkah Invitation</title>
  <meta name="description" content="You are cordially invited to the Nikkah of Amna &amp; Adil." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Cormorant:wght@300;500;600&family=Amiri:wght@400;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="stage" id="stage">

    <!-- ================= ENVELOPE ================= -->
    <section class="envelope-scene" id="scene">
      <p class="open-hint" id="hint">Tap the seal to open</p>

      <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open the invitation">
        <div class="door door-left">
          <div class="leaf-field"></div>
        </div>
        <div class="door door-right">
          <div class="leaf-field"></div>
        </div>
        <div class="seam" aria-hidden="true"></div>

        <!-- personalised addressee (filled from the invite link) -->
        <div class="env-to" id="envTo" hidden>
          <span class="env-to-label">To</span>
          <span class="env-to-name" id="envToName"></span>
        </div>

        <!-- gold wax seal -->
        <div class="seal" id="seal" aria-hidden="true">
          <svg viewBox="0 0 100 100" class="seal-svg">
            <defs>
              <radialGradient id="wax" cx="38%" cy="32%" r="75%">
                <stop offset="0%" stop-color="#d9b876"/>
                <stop offset="45%" stop-color="#b8924a"/>
                <stop offset="100%" stop-color="#876327"/>
              </radialGradient>
            </defs>
            <path class="seal-blob" fill="url(#wax)" d="M50 4c10 0 14 6 24 9s17 1 19 12-5 15-3 25 7 16-1 24-17 3-26 8-13 11-23 8-11-10-21-15S4 78 3 67s8-14 7-25S3 27 11 19s17-1 26-6S40 4 50 4z"/>
            <text x="50" y="50" dx="0.9" text-anchor="middle" dominant-baseline="central"
                  font-family="'Cormorant', 'Cormorant Garamond', serif" font-weight="300"
                  font-size="19" fill="#f6e8c6" opacity="0.92" letter-spacing="1.8">A &amp; A</text>
          </svg>
        </div>
      </div>
    </section>

    <!-- ================= INVITATION CARD ================= -->
    <article class="card" id="card" aria-hidden="true">
      <div class="card-bg" aria-hidden="true"></div>
      <div class="card-frame" aria-hidden="true"></div>

      <!-- intricate gold arch -->
      <div class="arch" aria-hidden="true"></div>

      <!-- faint mosque silhouette + bottom floral cluster -->
      <div class="mosque" aria-hidden="true"></div>
      <div class="florals-bottom" aria-hidden="true"></div>

      <div class="card-content">
        <p class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>

        <p class="blessing">With the blessings of Allah,<br />we request the honour of your presence<br />at the Nikkah of</p>

        <h1 class="names">
          <span class="name">Amna Mughal</span>
          <span class="amp">&amp;</span>
          <span class="name">Adil Kapadia</span>
        </h1>

        <div class="when">
          <span class="w-month">September</span>
          <span class="w-day">12</span>
          <span class="w-year">2026</span>
        </div>
        <p class="when-sub">Saturday, at 2:00 in the afternoon</p>

        <p class="venue">The Grand Pavilion<br />Toronto, Ontario</p>

        <button class="rsvp-btn" id="rsvpBtn" type="button" hidden>RSVP</button>
      </div>
    </article>

    <button class="reset-btn" id="reset" type="button" hidden>Close invitation</button>

    <!-- ================= RSVP MODAL ================= -->
    <div class="rsvp-modal" id="rsvpModal" hidden>
      <div class="rsvp-backdrop" id="rsvpBackdrop"></div>
      <div class="rsvp-box" role="dialog" aria-modal="true" aria-labelledby="rsvpName">
        <button class="rsvp-close" id="rsvpClose" type="button" aria-label="Close">&times;</button>

        <p class="rsvp-eyebrow">Kindly Respond</p>
        <h2 class="rsvp-name" id="rsvpName">&nbsp;</h2>
        <p class="rsvp-invited" id="rsvpInvited"></p>

        <div class="rsvp-choice">
          <button class="choice-btn" data-choice="accepted" id="btnAccept" type="button">Joyfully Accept</button>
          <button class="choice-btn" data-choice="declined" id="btnDecline" type="button">Regretfully Decline</button>
        </div>

        <div class="rsvp-seats" id="rsvpSeats" hidden>
          <label for="seatCount">Guests attending</label>
          <div class="seat-stepper">
            <button type="button" id="seatMinus" aria-label="Fewer">&minus;</button>
            <span id="seatCount">1</span>
            <button type="button" id="seatPlus" aria-label="More">+</button>
          </div>
        </div>

        <textarea class="rsvp-note" id="rsvpNote" rows="2" placeholder="A note for the couple (optional)"></textarea>

        <button class="rsvp-submit" id="rsvpSubmit" type="button" disabled>Send RSVP</button>
        <p class="rsvp-feedback" id="rsvpFeedback" aria-live="polite"></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script type="module" src="js/invite.js"></script>
</body>
</html>

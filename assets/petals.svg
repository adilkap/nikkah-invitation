<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <radialGradient id="petalG" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f7ece2"/>
      <stop offset="55%" stop-color="#ecdcd0"/>
      <stop offset="100%" stop-color="#d9bfae"/>
    </radialGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aeb78d"/>
      <stop offset="100%" stop-color="#7e8758"/>
    </linearGradient>

    <!-- a single rose petal with a soft crease -->
    <g id="petal">
      <path d="M0,0 C-13,-6 -15,-26 0,-38 C15,-26 13,-6 0,0 Z" fill="url(#petalG)" stroke="#caa98f" stroke-width="0.7" stroke-opacity="0.6"/>
      <path d="M0,-3 C0,-14 0,-24 0,-34" stroke="#c39e84" stroke-width="0.6" stroke-opacity="0.5" fill="none"/>
    </g>
    <!-- a single leaf -->
    <g id="leaf1">
      <path d="M0,0 C10,-6 22,-6 30,0 C22,6 10,6 0,0 Z" fill="url(#lg)"/>
      <path d="M1,0 H28" stroke="#6b7449" stroke-width="0.6" stroke-opacity="0.7" fill="none"/>
    </g>
  </defs>

  <g opacity="0.9">
    <use href="#petal" transform="translate(46,54)  rotate(15)  scale(0.95)"/>
    <use href="#leaf1" transform="translate(150,44) rotate(-25) scale(1)"/>
    <use href="#petal" transform="translate(196,96) rotate(140) scale(0.8)"/>
    <use href="#leaf1" transform="translate(70,120) rotate(200) scale(0.9)"/>
    <use href="#petal" transform="translate(120,110) rotate(75)  scale(0.7)"/>
    <use href="#petal" transform="translate(176,168) rotate(220) scale(0.9)"/>
    <use href="#leaf1" transform="translate(40,180)  rotate(40)  scale(0.95)"/>
    <use href="#petal" transform="translate(100,196) rotate(300) scale(0.85)"/>
    <use href="#leaf1" transform="translate(210,200) rotate(120) scale(0.8)"/>
  </g>
</svg>

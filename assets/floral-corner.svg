<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="petal" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#f7f1e6"/>
      <stop offset="100%" stop-color="#e7dcc6"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9c19a"/>
      <stop offset="100%" stop-color="#8b9468"/>
    </linearGradient>

    <!-- a single layered rose -->
    <g id="rose">
      <circle r="34" fill="url(#petal)"/>
      <g fill="none" stroke="#d9caac" stroke-width="1.4" stroke-opacity="0.8">
        <circle r="30"/>
        <path d="M0 -18 a18 18 0 1 1 -0.1 0"/>
        <path d="M0 -11 a11 11 0 1 0 0.1 0"/>
        <path d="M-6 -3 q6 -7 12 0 q-6 7 -12 0z"/>
      </g>
      <g fill="#ffffff" fill-opacity="0.55" stroke="#e3d6bb" stroke-width="1">
        <path d="M0 0 q -16 -10 -26 4 q 14 12 26 -4z"/>
        <path d="M0 0 q 16 -10 26 4 q -14 12 -26 -4z"/>
        <path d="M0 0 q 10 -18 -2 -28 q -14 12 2 28z"/>
      </g>
    </g>

    <g id="sleaf">
      <path d="M0 0 q 26 -10 46 -2 q -16 16 -46 2 z" fill="url(#leaf)"/>
      <path d="M2 -1 q 22 0 42 0" fill="none" stroke="#7c855c" stroke-width="0.9" stroke-opacity="0.7"/>
    </g>
  </defs>

  <!-- foliage spray -->
  <g transform="translate(20 20)">
    <use href="#sleaf" transform="translate(40 40) rotate(35) scale(1.15)"/>
    <use href="#sleaf" transform="translate(30 90) rotate(70) scale(1)"/>
    <use href="#sleaf" transform="translate(90 30) rotate(0) scale(1)"/>
    <use href="#sleaf" transform="translate(120 70) rotate(30) scale(0.85)"/>
    <use href="#sleaf" transform="translate(70 120) rotate(60) scale(0.85)"/>
    <use href="#sleaf" transform="translate(150 30) rotate(-10) scale(0.7)"/>
    <use href="#sleaf" transform="translate(35 150) rotate(80) scale(0.7)"/>

    <!-- roses cluster -->
    <use href="#rose" transform="translate(70 70) scale(1.1)"/>
    <use href="#rose" transform="translate(120 40) scale(0.8)"/>
    <use href="#rose" transform="translate(45 125) scale(0.85)"/>
    <use href="#rose" transform="translate(125 110) scale(0.62)"/>

    <!-- little buds -->
    <g fill="url(#petal)" stroke="#e3d6bb" stroke-width="1">
      <circle cx="165" cy="70" r="9"/>
      <circle cx="80" cy="160" r="8"/>
    </g>
  </g>
</svg>

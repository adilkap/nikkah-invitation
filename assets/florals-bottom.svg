<svg xmlns="http://www.w3.org/2000/svg" width="960" height="410" viewBox="0 0 960 410">
  <defs>
    <radialGradient id="gWhiteRose" cx="42%" cy="30%" r="78%"><stop offset="0%" stop-color="#fffefb"/><stop offset="52%" stop-color="#f8f1e5"/><stop offset="100%" stop-color="#e6dcc7"/></radialGradient>
    <radialGradient id="gIvory" cx="42%" cy="30%" r="78%"><stop offset="0%" stop-color="#fffaf0"/><stop offset="55%" stop-color="#f3ead7"/><stop offset="100%" stop-color="#ddceb0"/></radialGradient>
    <radialGradient id="gBlush" cx="42%" cy="30%" r="78%"><stop offset="0%" stop-color="#fdeff1"/><stop offset="55%" stop-color="#f4d7dd"/><stop offset="100%" stop-color="#e3b3bd"/></radialGradient>
    <radialGradient id="gEuc"  cx="35%" cy="25%" r="85%"><stop offset="0%" stop-color="#d8e0cd"/><stop offset="60%" stop-color="#aebc98"/><stop offset="100%" stop-color="#87966e"/></radialGradient>
    <linearGradient id="gLeaf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b9c49a"/><stop offset="55%" stop-color="#8c9a62"/><stop offset="100%" stop-color="#637048"/></linearGradient>
    <linearGradient id="gLeafD" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9aac74"/><stop offset="100%" stop-color="#4c5d32"/></linearGradient>

    <!-- rounded rose petal with a soft vein (fill inherited per-bloom) -->
    <g id="wp">
      <path d="M0,0 C-12,-3 -16,-18 -9,-30 C-5,-36 5,-36 9,-30 C16,-18 12,-3 0,0 Z"/>
      <path d="M0,-4 C-2,-12 -1,-20 0,-27" fill="none" stroke="#c3b395" stroke-width="0.5" stroke-opacity="0.5"/>
    </g>
    <path id="ap" d="M0,-5 C-8,-7 -9,-24 0,-28 C9,-24 8,-7 0,-5 Z"/>

    <!-- full garden rose -->
    <g id="rose" stroke="#c6b89d" stroke-opacity="0.5" stroke-width="0.55">
      <use href="#wp" transform="rotate(0)"/><use href="#wp" transform="rotate(45)"/><use href="#wp" transform="rotate(90)"/><use href="#wp" transform="rotate(135)"/><use href="#wp" transform="rotate(180)"/><use href="#wp" transform="rotate(225)"/><use href="#wp" transform="rotate(270)"/><use href="#wp" transform="rotate(315)"/>
      <use href="#wp" transform="rotate(22) scale(.72)"/><use href="#wp" transform="rotate(67) scale(.72)"/><use href="#wp" transform="rotate(112) scale(.72)"/><use href="#wp" transform="rotate(157) scale(.72)"/><use href="#wp" transform="rotate(202) scale(.72)"/><use href="#wp" transform="rotate(247) scale(.72)"/><use href="#wp" transform="rotate(292) scale(.72)"/><use href="#wp" transform="rotate(337) scale(.72)"/>
      <use href="#wp" transform="rotate(15) scale(.48)"/><use href="#wp" transform="rotate(75) scale(.48)"/><use href="#wp" transform="rotate(135) scale(.48)"/><use href="#wp" transform="rotate(195) scale(.48)"/><use href="#wp" transform="rotate(255) scale(.48)"/><use href="#wp" transform="rotate(315) scale(.48)"/>
      <use href="#wp" transform="rotate(45) scale(.26)"/><use href="#wp" transform="rotate(165) scale(.26)"/><use href="#wp" transform="rotate(285) scale(.26)"/>
      <circle r="3.4" fill="#eee3c9" stroke="none"/>
      <circle r="1.4" fill="#d8c79a" stroke="none"/>
    </g>

    <!-- ruffly peony (fuller, looser) -->
    <g id="peony" stroke="#c6b89d" stroke-opacity="0.5" stroke-width="0.5">
      <use href="#wp" transform="rotate(0) scale(1.05)"/><use href="#wp" transform="rotate(40) scale(1.05)"/><use href="#wp" transform="rotate(80) scale(1.05)"/><use href="#wp" transform="rotate(120) scale(1.05)"/><use href="#wp" transform="rotate(160) scale(1.05)"/><use href="#wp" transform="rotate(200) scale(1.05)"/><use href="#wp" transform="rotate(240) scale(1.05)"/><use href="#wp" transform="rotate(280) scale(1.05)"/><use href="#wp" transform="rotate(320) scale(1.05)"/>
      <use href="#wp" transform="rotate(20) scale(.74)"/><use href="#wp" transform="rotate(60) scale(.74)"/><use href="#wp" transform="rotate(100) scale(.74)"/><use href="#wp" transform="rotate(140) scale(.74)"/><use href="#wp" transform="rotate(180) scale(.74)"/><use href="#wp" transform="rotate(220) scale(.74)"/><use href="#wp" transform="rotate(260) scale(.74)"/><use href="#wp" transform="rotate(300) scale(.74)"/><use href="#wp" transform="rotate(340) scale(.74)"/>
      <use href="#wp" transform="rotate(10) scale(.5)"/><use href="#wp" transform="rotate(70) scale(.5)"/><use href="#wp" transform="rotate(130) scale(.5)"/><use href="#wp" transform="rotate(190) scale(.5)"/><use href="#wp" transform="rotate(250) scale(.5)"/><use href="#wp" transform="rotate(310) scale(.5)"/>
      <use href="#wp" transform="rotate(40) scale(.28)"/><use href="#wp" transform="rotate(160) scale(.28)"/><use href="#wp" transform="rotate(280) scale(.28)"/>
      <circle r="3" fill="#efe6cd" stroke="none"/>
    </g>

    <!-- anemone (white petals, dark eye) -->
    <g id="anem" stroke="#c6b89d" stroke-opacity="0.45" stroke-width="0.55">
      <use href="#ap" transform="rotate(0)"/><use href="#ap" transform="rotate(45)"/><use href="#ap" transform="rotate(90)"/><use href="#ap" transform="rotate(135)"/><use href="#ap" transform="rotate(180)"/><use href="#ap" transform="rotate(225)"/><use href="#ap" transform="rotate(270)"/><use href="#ap" transform="rotate(315)"/>
      <circle r="6.5" fill="#37282d" stroke="none"/>
      <circle r="6.8" fill="none" stroke="#241a1f" stroke-width="2.6" stroke-dasharray="0.5 2" stroke-linecap="round"/>
    </g>

    <!-- eucalyptus -->
    <g id="euc">
      <path d="M0,0 C16,-22 26,-50 24,-86" fill="none" stroke="#8a9a6e" stroke-width="2"/>
      <g fill="url(#gEuc)" stroke="#6f7d52" stroke-width="0.6">
        <ellipse cx="9" cy="-12" rx="7.5" ry="10" transform="rotate(28 9 -12)"/>
        <ellipse cx="-2" cy="-26" rx="7.5" ry="10" transform="rotate(-18 -2 -26)"/>
        <ellipse cx="14" cy="-40" rx="7" ry="9.5" transform="rotate(34 14 -40)"/>
        <ellipse cx="4" cy="-56" rx="6.5" ry="9" transform="rotate(-14 4 -56)"/>
        <ellipse cx="16" cy="-70" rx="6" ry="8" transform="rotate(28 16 -70)"/>
        <ellipse cx="9" cy="-84" rx="5" ry="6.5"/>
      </g>
    </g>
    <g id="fern">
      <path d="M0,0 C8,-26 12,-54 10,-86" fill="none" stroke="#7d8c5c" stroke-width="1.6"/>
      <g stroke="#7d8c5c" stroke-width="1.1" fill="none" stroke-linecap="round">
        <path d="M2,-10 C12,-12 18,-18 20,-26"/><path d="M0,-22 C-8,-26 -13,-32 -14,-40"/>
        <path d="M5,-32 C14,-34 20,-40 21,-48"/><path d="M3,-44 C-5,-48 -9,-54 -10,-60"/>
        <path d="M7,-56 C14,-58 18,-63 19,-70"/><path d="M6,-70 C0,-74 -3,-78 -4,-82"/>
      </g>
    </g>
    <g id="leafspray">
      <path d="M0,0 C20,-8 46,-8 70,3" fill="none" stroke="#7a875a" stroke-width="1.4"/>
      <g fill="url(#gLeaf)" stroke="#5f6c44" stroke-width="0.5">
        <path d="M12,-2 q13,-10 27,-3 q-11,12 -27,3z"/>
        <path d="M34,-3 q13,-10 27,-3 q-11,12 -27,3z"/>
        <path d="M2,1 q-12,-8 -24,0 q10,10 24,0z"/>
      </g>
    </g>

    <!-- baby's breath (airy white) -->
    <g id="bb" stroke="#aeb98f" stroke-width="0.7" fill="none">
      <path d="M0,0 C2,-12 -2,-22 0,-34"/><path d="M0,-12 C8,-16 12,-22 13,-30"/><path d="M0,-18 C-8,-22 -12,-28 -13,-36"/><path d="M0,-26 C6,-30 9,-34 10,-40"/>
    </g>
    <g id="bbdots" fill="#fffdf7" stroke="#e7dcc6" stroke-width="0.3">
      <circle cx="0" cy="-34" r="2"/><circle cx="13" cy="-30" r="1.9"/><circle cx="-13" cy="-36" r="1.9"/><circle cx="10" cy="-40" r="1.7"/><circle cx="0" cy="-12" r="1.6"/><circle cx="6" cy="-22" r="1.5"/><circle cx="-6" cy="-24" r="1.5"/>
    </g>
  </defs>

  <g transform="translate(0,110)">
  <!-- soft grounding shadow under the whole garland -->
  <ellipse cx="480" cy="300" rx="500" ry="70" fill="#9aa478" opacity="0.12"/>

  <!-- ===== foliage layer (full width, taller at ends) ===== -->
  <g opacity="0.97">
    <use href="#euc"  transform="translate(40,250) rotate(-26) scale(1.5)"/>
    <use href="#fern" transform="translate(95,250) rotate(-8) scale(1.45)"/>
    <use href="#leafspray" transform="translate(20,205) rotate(-14) scale(1.3)"/>
    <use href="#fern" transform="translate(230,250) rotate(-10) scale(1.2)"/>
    <use href="#euc"  transform="translate(330,245) rotate(2) scale(1.35)"/>
    <use href="#leafspray" transform="translate(300,225) rotate(4) scale(1.1)"/>
    <use href="#fern" transform="translate(470,250) rotate(4) scale(1.3)"/>
    <use href="#euc"  transform="translate(560,245) rotate(-4) scale(1.3)"/>
    <use href="#leafspray" transform="translate(640,225) rotate(176) scale(1.1)"/>
    <use href="#fern" transform="translate(720,250) rotate(8) scale(1.2)"/>
    <use href="#euc"  transform="translate(900,250) rotate(26) scale(1.5)"/>
    <use href="#fern" transform="translate(850,250) rotate(10) scale(1.45)"/>
    <use href="#leafspray" transform="translate(900,205) rotate(190) scale(1.3)"/>
  </g>

  <!-- baby's breath behind blooms -->
  <g>
    <use href="#bb" transform="translate(150,250) scale(1.2)"/><use href="#bbdots" transform="translate(150,250) scale(1.2)"/>
    <use href="#bb" transform="translate(400,250) scale(1.3)"/><use href="#bbdots" transform="translate(400,250) scale(1.3)"/>
    <use href="#bb" transform="translate(560,248) scale(1.2)"/><use href="#bbdots" transform="translate(560,248) scale(1.2)"/>
    <use href="#bb" transform="translate(810,250) scale(1.2)"/><use href="#bbdots" transform="translate(810,250) scale(1.2)"/>
  </g>

  <!-- ===== blooms, continuous across the full width ===== -->
  <use href="#rose"   fill="url(#gWhiteRose)" transform="translate(75,245) scale(1.45)"/>
  <use href="#peony"  fill="url(#gIvory)"     transform="translate(150,275) scale(1.2)"/>
  <use href="#anem"   fill="url(#gWhiteRose)" transform="translate(40,285) scale(1.05)"/>
  <use href="#rose"   fill="url(#gBlush)"     transform="translate(120,300) scale(1.0)"/>

  <use href="#peony"  fill="url(#gWhiteRose)" transform="translate(245,260) scale(1.35)"/>
  <use href="#rose"   fill="url(#gIvory)"     transform="translate(320,290) scale(1.15)"/>
  <use href="#anem"   fill="url(#gWhiteRose)" transform="translate(210,300) scale(1.0)"/>

  <use href="#rose"   fill="url(#gWhiteRose)" transform="translate(420,255) scale(1.5)"/>
  <use href="#peony"  fill="url(#gIvory)"     transform="translate(490,285) scale(1.2)"/>
  <use href="#rose"   fill="url(#gBlush)"     transform="translate(390,300) scale(1.0)"/>
  <use href="#anem"   fill="url(#gWhiteRose)" transform="translate(470,305) scale(1.0)"/>

  <use href="#peony"  fill="url(#gWhiteRose)" transform="translate(595,258) scale(1.35)"/>
  <use href="#rose"   fill="url(#gIvory)"     transform="translate(660,288) scale(1.15)"/>
  <use href="#anem"   fill="url(#gWhiteRose)" transform="translate(560,300) scale(1.0)"/>

  <use href="#rose"   fill="url(#gWhiteRose)" transform="translate(760,250) scale(1.45)"/>
  <use href="#peony"  fill="url(#gIvory)"     transform="translate(835,278) scale(1.25)"/>
  <use href="#anem"   fill="url(#gWhiteRose)" transform="translate(905,290) scale(1.05)"/>
  <use href="#rose"   fill="url(#gBlush)"     transform="translate(820,302) scale(1.0)"/>

  <!-- bridging blossoms to fill any gaps -->
  <use href="#rose" fill="url(#gIvory)"     transform="translate(180,300) scale(0.85)"/>
  <use href="#rose" fill="url(#gWhiteRose)" transform="translate(360,300) scale(0.8)"/>
  <use href="#rose" fill="url(#gIvory)"     transform="translate(640,302) scale(0.82)"/>
  <use href="#rose" fill="url(#gWhiteRose)" transform="translate(720,300) scale(0.8)"/>

  <!-- baby's breath in front, sprinkled -->
  <g opacity="0.95">
    <use href="#bbdots" transform="translate(280,250) scale(1)"/>
    <use href="#bbdots" transform="translate(540,248) scale(1)"/>
    <use href="#bbdots" transform="translate(690,250) scale(1)"/>
    <use href="#bbdots" transform="translate(880,250) scale(1)"/>
    <use href="#bbdots" transform="translate(95,250) scale(0.9)"/>
  </g>
  </g>

  <!-- taller tier: foliage & blooms rising higher at the sides for added height -->
  <use href="#euc"  transform="translate(60,340) rotate(-32) scale(1.85)"/>
  <use href="#fern" transform="translate(140,345) rotate(-15) scale(1.7)"/>
  <use href="#euc"  transform="translate(905,340) rotate(32) scale(1.85)"/>
  <use href="#fern" transform="translate(825,345) rotate(15) scale(1.7)"/>
  <use href="#bb" transform="translate(225,330) scale(1.3)"/><use href="#bbdots" transform="translate(225,330) scale(1.3)"/>
  <use href="#bb" transform="translate(735,330) scale(1.3)"/><use href="#bbdots" transform="translate(735,330) scale(1.3)"/>
  <use href="#rose"  fill="url(#gWhiteRose)" transform="translate(95,315) scale(1.25)"/>
  <use href="#peony" fill="url(#gIvory)"     transform="translate(180,345) scale(1.05)"/>
  <use href="#peony" fill="url(#gWhiteRose)" transform="translate(870,315) scale(1.25)"/>
  <use href="#rose"  fill="url(#gIvory)"     transform="translate(785,345) scale(1.05)"/>
  <use href="#rose"  fill="url(#gBlush)"     transform="translate(300,355) scale(0.95)"/>
  <use href="#rose"  fill="url(#gWhiteRose)" transform="translate(660,355) scale(0.95)"/>
  <use href="#bbdots" transform="translate(140,335) scale(1)"/>
  <use href="#bbdots" transform="translate(820,335) scale(1)"/>
</svg>
